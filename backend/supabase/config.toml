[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "10MB"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.alerts-run]
schedule = "0 */6 * * *"  # Every 6 hours

[functions.recurring-run]
schedule = "0 6 * * *"  # Daily at 6:00 AM UTC

[functions.weekly-summary]
schedule = "0 11 * * 1"  # Every Monday at 11:00 UTC (8:00 AM Uruguay)
